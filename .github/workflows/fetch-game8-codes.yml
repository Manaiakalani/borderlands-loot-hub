name: Fetch SHiFT Codes from Game8

on:
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-game8-codes
  cancel-in-progress: true

jobs:
  fetch-codes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Fetch Game8 codes
        run: node scripts/fetch-game8-codes.mjs
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet src/data/shiftCodes.ts || echo "changes=true" >> $GITHUB_OUTPUT
      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/shiftCodes.ts
          git commit -m "🎯 Auto-update SHiFT codes from Game8 [skip ci]"
          git push
